<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#030305" />
    <meta name="description" content="Secure system terminal for Only True Perspective. Restricted access only.">
    <title>OTP // SYSTEM TERMINAL</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --term-green: #00ff00;
            --term-dim: rgba(0, 255, 0, 0.5);
            --term-bg: #030305;
            --term-glow: 0 0 10px rgba(51, 255, 51, 0.4);
            --accent2: var(--accent2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Space Grotesk', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            text-shadow: var(--term-glow);
        }

        /* CRT SCANLINES EFFECT */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* FLICKER ANIMATION */
        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.85; }
            10% { opacity: 0.95; }
            15% { opacity: 0.9; }
            25% { opacity: 0.98; }
            30% { opacity: 0.8; }
            50% { opacity: 0.96; }
            100% { opacity: 0.99; }
        }

        .terminal-container {
            animation: flicker 0.15s infinite;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border: 2px solid var(--term-green);
            background: rgba(10, 20, 10, 0.8);
            box-shadow: inset 0 0 20px rgba(51, 255, 51, 0.2), 0 0 15px rgba(51, 255, 51, 0.1);
            position: relative;
            z-index: 10;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .term-header {
            border-bottom: 2px solid var(--term-green);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .term-title {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-table {
            width: 100%;
            font-size: 1rem;
            margin-bottom: 25px;
            color: var(--term-dim);
        }

        .status-table td:last-child {
            text-align: right;
            color: var(--term-green);
        }

        .auth-prompt {
            margin-top: 10px;
            font-size: 1.2rem;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background: var(--term-green);
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .gate-input {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            width: 100%;
            outline: none;
            margin-top: 5px;
            caret-color: transparent; /* custom cursor */
        }

        .login-btn {
            background: var(--term-green);
            color: var(--term-bg);
            border: none;
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            margin-top: 25px;
            width: 100%;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .login-btn:hover {
            box-shadow: 0 0 20px var(--term-green);
        }

        .login-btn:disabled {
            background: var(--term-dim);
            cursor: not-allowed;
        }

        #errorMsg {
            margin-top: 15px;
            font-size: 1rem;
            text-align: center;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 480px) {
            .terminal-container { 
                border: none; 
                height: auto;
                min-height: 100vh;
                max-width: 100%; 
                background: var(--term-bg);
                padding: 15px; 
                font-size: 14px;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
            }
            .term-title { font-size: 1.4rem; }
            .login-btn { padding: 15px; font-size: 1.1rem; }
            .gate-input { font-size: 1.2rem; }
            /* Prevent keyboard from blocking by adding padding bottom */
            body { align-items: flex-start; }
            .terminal-container { padding-bottom: 50vh; }
        }
    </style>
  <!-- THEME GUARD: Prevents flickering by initializing theme before first paint -->
  <script>
    (function() {
        window.OTP_HUES = [
            { dark: '0, 236, 255', light: '0, 170, 204' }, // Cyan
            { dark: '170, 0, 255', light: '120, 0, 200' }, // Purple
            { dark: '255, 0, 170', light: '200, 0, 120' }, // Pink
            { dark: '0, 255, 170', light: '0, 180, 120' }, // Green
            { dark: '255, 215, 0', light: '184, 134, 11' }, // Gold
            { dark: '255, 60, 0',  light: '200, 40, 0' }    // Neon Orange
        ];
        
        // Randomize hue every load/refresh
        let hueIndex = Math.floor(Math.random() * window.OTP_HUES.length);
        sessionStorage.setItem('otp_hue_index', hueIndex);
        window.OTP_HUE_INDEX = hueIndex;
        const selectedHue = window.OTP_HUES[hueIndex];

        const savedTheme = localStorage.getItem('theme');
        const isManual = localStorage.getItem('theme_manual') === 'true';
        const manualTime = parseInt(localStorage.getItem('theme_manual_time') || '0');
        const isExpired = Date.now() - manualTime > 12 * 60 * 60 * 1000;
        
        let theme;
        if (isManual && !isExpired) {
            theme = savedTheme;
        } else {
            const hour = new Date().getHours();
            theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
        }

        const rootStyle = document.documentElement.style;
        if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            rootStyle.setProperty('--accent2-rgb', selectedHue.light);
            rootStyle.setProperty('--accent2', `rgb(${selectedHue.light})`);
        } else {
            document.documentElement.removeAttribute('data-theme');
            rootStyle.setProperty('--accent2-rgb', selectedHue.dark);
            rootStyle.setProperty('--accent2', `rgb(${selectedHue.dark})`);
        }
    })();
  </script>
</head>
<body>

    <main class="terminal-container">
        <header class="term-header">
            <h1 class="term-title">OTP SECURE TERMINAL (TM)</h1>
            <h2 style="font-size: 0.8rem; color: var(--term-dim); font-weight: normal;">SYSTEM OS v10.5 RELEASE</h2>
            <p class="sr-only">Welcome to the secure server terminal of Only True Perspective. Execute authorized commands to interact with the database.</p>
        </header>

        <table class="status-table">
            <tr><td>UPLINK STATUS:</td><td>CONNECTED</td></tr>
            <tr><td>CORE FREQ:</td><td>2.4 GHZ</td></tr>
            <tr><td>ENCRYPTION:</td><td>BIT-SHIFTER v9</td></tr>
        </table>

        <div class="auth-prompt">
            <label for="passcode">> ENTER SECURITY COMMAND:</label>
            <form onsubmit="event.preventDefault(); attemptLogin();">
                <div style="display: flex; align-items: center; margin-top: 5px; position: relative;">
                    <span style="color: var(--term-green); margin-right: 5px;" aria-hidden="true">></span>
                    <input type="password" id="passcode" class="gate-input" maxlength="20" autocomplete="off" autofocus oninput="updateCursor()" aria-label="Command Input">
                    <span id="fake-cursor" class="cursor" aria-hidden="true"></span>
                    <button type="button" onclick="togglePasscode()" id="eyeBtn" style="background: none; border: none; color: var(--term-dim); cursor: pointer; padding: 5px; font-size: 0.8rem; position: absolute; right: 0;">VIEW</button>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">EXECUTE COMMAND</button>
            </form>
        </div>

        <div id="errorMsg" style="display: none; color: #ff0000; text-shadow: 0 0 5px #ff0000; margin-top: 15px;" role="alert">ACCESS DENIED // INTRUSION DETECTED</div>
    </main>

    <script>
        function togglePasscode() {
            const input = document.getElementById('passcode');
            const btn = document.getElementById('eyeBtn');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'HIDE';
                btn.style.color = 'var(--term-green)';
            } else {
                input.type = 'password';
                btn.textContent = 'VIEW';
                btn.style.color = 'var(--term-dim)';
            }
        }
        function updateCursor() {
            const input = document.getElementById('passcode');
            const cursor = document.getElementById('fake-cursor');
            if (input.value.length > 0) cursor.style.display = 'inline-block';
            else cursor.style.display = 'inline-block';
        }

        // Always use the canonical Vercel deployment as primary target
        const CANONICAL_API = '';
        const FALLBACK_PASS = 'otp2026';

        // Fetch with a hard timeout to avoid hanging on cold starts
        async function fetchWithTimeout(url, opts, ms = 7000) {
            const controller = new AbortController();
            const tid = setTimeout(() => controller.abort(), ms);
            try {
                const res = await fetch(url, { ...opts, signal: controller.signal });
                clearTimeout(tid);
                return res;
            } catch (e) {
                clearTimeout(tid);
                throw e;
            }
        }

        // Probe a URL to check if the API responds (returns true/false)
        async function probeServer(base) {
            try {
                const res = await fetchWithTimeout(base + '/api/status', {
                    method: 'GET'
                }, 5000);
                // Any HTTP response means server is alive
                return res.status !== 0;
            } catch (e) { return false; }
        }

        async function getBestApiBase() {
            // Priority: saved override → canonical Vercel → current origin
            const saved = localStorage.getItem('otp_api_base');
            if (saved && saved !== window.location.origin) return saved;
            return CANONICAL_API;
        }

        async function attemptLogin() {
            console.log("[AUTH_DEBUG] Initiating login attempt...");
            const input = document.getElementById('passcode');
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            const pass = input.value.trim();

            err.style.display = 'none';

            if (!pass) {
                showError("ERROR: COMMAND CANNOT BE EMPTY");
                return;
            }

            btn.textContent = "ROUTING SIGNAL...";
            btn.disabled = true;

            try {
                const baseUrl = window.OTP.getApiBase();
                console.log(`[AUTH_DEBUG] Resolved API Base: ${baseUrl}`);
                localStorage.setItem('otp_api_base', baseUrl);

                btn.textContent = "VERIFYING...";
                console.log("[AUTH_DEBUG] Sending request to /api/auth/login");

                let res;
                try {
                    res = await fetchWithTimeout(baseUrl + '/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ passcode: pass })
                    }, 8000);
                    console.log(`[AUTH_DEBUG] Server response: ${res.status}`);

                } catch (netErr) {
                    console.error("[AUTH_DEBUG] Network error on first attempt:", netErr);
                    // Cold start or network issue — try once more after 2s
                    btn.textContent = "RETRYING...";
                    await new Promise(r => setTimeout(r, 2000));
                    try {
                        res = await fetchWithTimeout(baseUrl + '/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ passcode: pass })
                        }, 10000);
                        console.log(`[AUTH_DEBUG] Server response on retry: ${res.status}`);
                    } catch (retryErr) {
                        console.error("[AUTH_DEBUG] Network error on retry, checking fallback:", retryErr);
                        // Both attempts failed — allow bypass pass only
                        if (pass === FALLBACK_PASS) {
                            console.log("[AUTH_DEBUG] Fallback passcode matched. Engaging Legacy Mode.");
                            saveAndRedirect('static-bypass-token');
                        } else {
                            showError("ERROR: SERVER UNREACHABLE — CHECK CONNECTION");
                        }
                        return;
                    }
                }

                if (res.ok) {
                    const data = await res.json();
                    console.log("[AUTH_DEBUG] Login response data:", data);
                    if (data.success && data.token) { 
                        saveAndRedirect(data.token); 
                        return; 
                    }
                } else if (res.status === 401 || res.status === 403) {
                    console.warn("[AUTH_DEBUG] Access Denied (401/403).");
                    showError("ERROR: INVALID COMMAND SEQUENCE");
                    return;
                }

                throw new Error(`Server returned non-OK status: ${res.status}`);

            } catch (e) {
                console.error("[AUTH_DEBUG] General error, checking fallback:", e);
                if (pass === FALLBACK_PASS) {
                    console.log("[AUTH_DEBUG] Fallback passcode matched in catch block. Engaging Legacy Mode.");
                    saveAndRedirect('static-bypass-token');
                }
                else showError("ERROR: INVALID COMMAND SEQUENCE");
            }
        }

        function saveAndRedirect(token) {
            console.log(`[AUTH_DEBUG] Saving token: ${token.substring(0, 20)}... and redirecting.`);
            localStorage.setItem('otp_admin_token', token);
            const btn = document.getElementById('loginBtn');
            btn.style.background = '#00ff00';
            btn.textContent = "ACCESS GRANTED";
            setTimeout(() => { window.location.href = 'otp-terminal.html?v=' + Date.now(); }, 800);
        }

        function showError(msg) {
            const err = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');
            const input = document.getElementById('passcode');
            err.textContent = msg || "ACCESS DENIED // INTRUSION DETECTED";
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = "IDENTIFICATION REQUIRED";
            input.value = '';
            input.focus();
        }
    </script>
</body>
</html>
