<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Insight | OTP</title>
  <link rel="stylesheet" href="./styles.css?v=1769637172" />
  <style>
    body { background: #030305; color: #fff; margin: 0 !important; }
    .post-content { max-width: 800px; margin: 60px auto; padding: 0 20px; line-height: 1.8; font-size: 1.1rem; color: var(--muted); }
    .post-header { text-align: center; margin-bottom: 60px; }
    .post-header h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin-bottom: 10px; color: #fff; }
    .post-meta { font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; color: var(--accent2); margin-bottom: 20px; display: block; letter-spacing: 2px; text-transform: uppercase; }
    .post-img { width: 100%; border-radius: 12px; margin-bottom: 40px; border: 1px solid var(--stroke); }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; margin-bottom: 40px; font-weight: 600; transition: color 0.3s; }
    .back-btn:hover { color: var(--accent2); }
  </style>
  <script src="site-config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="bg-fixed"></div>
  
  <header class="nav nav-split">
    <a href="index.html" class="nav-logo" aria-label="OTP">
      <img src="assets/otp_v2.png" alt="OTP" class="otp-mark" />
    </a>
    <nav class="nav-links">
      <a href="insights.html" class="k-hover">← Back to Insights</a>
    </nav>
  </header>

  <main class="wrap" style="padding-top: 120px;">
    <div class="post-header">
        <a href="insights.html" class="back-btn k-hover">← THE VAULT</a>
        <span class="post-meta" id="postMeta">FETCHING DATA...</span>
        <h1 id="postTitle" class="syne-extra-bold">Loading...</h1>
    </div>

    <div class="post-content">
        <img id="postImg" src="" alt="" class="post-img" style="display: none;">
        <div id="postBody">Generating high-fidelity neural uplink...</div>
    </div>
  </main>

  <script src="stars-v2.js"></script>
  <script src="site-init.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        if (!slug) { window.location.href = 'insights.html'; return; }

        try {
            const supabase = window.supabase.createClient(window.OTP_CONFIG.supabaseUrl, window.OTP_CONFIG.supabaseKey);
            const { data: post, error } = await supabase
                .from('posts')
                .select('*')
                .eq('slug', slug)
                .single();

            if (error || !post) throw new Error("POST_NOT_FOUND");

            document.title = `${post.title} | Only True Perspective`;
            document.getElementById('postTitle').innerText = post.title;
            document.getElementById('postMeta').innerText = `${new Date(post.created_at).toLocaleDateString()} • ${post.category || 'Insight'}`;
            document.getElementById('postBody').innerHTML = post.content || '';
            
            if (post.image_url) {
                const img = document.getElementById('postImg');
                img.src = post.image_url;
                img.style.display = 'block';
            }

            console.log(`[OTP] Loaded: ${post.title}`);
        } catch (e) {
            console.error("Uplink Error:", e);
            document.getElementById('postTitle').innerText = "SIGNAL LOST";
            document.getElementById('postBody').innerHTML = "The data requested is unavailable or has been archived. <br><br><a href='insights.html' style='color:var(--accent2)'>Return to Vault</a>";
        }
    });
  </script>
</body>
</html>
