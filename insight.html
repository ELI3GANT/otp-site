    <!-- THEME GUARD: Prevents flickering by initializing theme before first paint -->
  <script>
    (function() {
        window.OTP_HUES = [
            { dark: '0, 236, 255', light: '0, 170, 204' }, // Cyan
            { dark: '170, 0, 255', light: '120, 0, 200' }, // Purple
            { dark: '255, 0, 170', light: '200, 0, 120' }, // Pink
            { dark: '0, 255, 170', light: '0, 180, 120' }, // Green
            { dark: '255, 215, 0', light: '184, 134, 11' }, // Gold
            { dark: '255, 60, 0',  light: '200, 40, 0' }    // Neon Orange
        ];
        
        // Randomize hue every load/refresh
        let hueIndex = Math.floor(Math.random() * window.OTP_HUES.length);
        sessionStorage.setItem('otp_hue_index', hueIndex);
        window.OTP_HUE_INDEX = hueIndex;
        const selectedHue = window.OTP_HUES[hueIndex];

        const savedTheme = localStorage.getItem('theme');
        const isManual = localStorage.getItem('theme_manual') === 'true';
        const manualTime = parseInt(localStorage.getItem('theme_manual_time') || '0');
        const isExpired = Date.now() - manualTime > 12 * 60 * 60 * 1000;
        
        let theme;
        if (isManual && !isExpired) {
            theme = savedTheme;
        } else {
            const hour = new Date().getHours();
            theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
        }

        const rootStyle = document.documentElement.style;
        if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            rootStyle.setProperty('--accent2-rgb', selectedHue.light);
            rootStyle.setProperty('--accent2', `rgb(${selectedHue.light})`);
        } else {
            document.documentElement.removeAttribute('data-theme');
            rootStyle.setProperty('--accent2-rgb', selectedHue.dark);
            rootStyle.setProperty('--accent2', `rgb(${selectedHue.dark})`);
        }
    })();
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        if (!slug) { window.location.href = 'insights.html'; return; }

        // Wait for OTP_CONFIG to be available
        let attempts = 0;
        while (!window.OTP_CONFIG && attempts < 20) {
            await new Promise(r => setTimeout(r, 150));
            attempts++;
        }

        try {
            if (!window.supabase || !window.OTP_CONFIG) throw new Error('CONFIG_MISSING');

            const supabase = window.supabase.createClient(window.OTP_CONFIG.supabaseUrl, window.OTP_CONFIG.supabaseKey);
            const { data: post, error } = await supabase
                .from('posts')
                .select('*')
                .eq('slug', slug)
                .eq('published', true)  // Block drafts from being accessed directly
                .single();

            if (error || !post) throw new Error("POST_NOT_FOUND");

            // --- Update Page Meta ---
            document.title = `${post.title} | Only True Perspective`;
            document.getElementById('postTitle').innerText = post.title;
            document.getElementById('postMeta').innerText = `${new Date(post.created_at).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})} • ${post.category || 'Insight'}`;

            // Dynamically update OG tags for proper social sharing
            const postExcerpt = (post.excerpt || post.content || '').replace(/<[^>]*>/g, '').substring(0, 160);
            const postImage = post.image_url || 'https://onlytrueperspective.tech/og.jpg';
            const postUrl = `https://onlytrueperspective.tech/insight.html?slug=${encodeURIComponent(slug)}`;
            document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${post.title} | Only True Perspective`);
            document.querySelector('meta[property="og:description"]')?.setAttribute('content', postExcerpt);
            document.querySelector('meta[property="og:image"]')?.setAttribute('content', postImage);
            document.querySelector('meta[property="og:url"]')?.setAttribute('content', postUrl);
            document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', post.title);
            document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', postExcerpt);
            document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', postImage);
            document.querySelector('link[rel="canonical"]')?.setAttribute('href', postUrl);
            
            
            // --- FIRE LIVE TRAFFIC SIGNAL ---
            let apiBase = window.OTP_CONFIG?.apiBase || '';
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') apiBase = window.location.origin;
            
            fetch(`${apiBase}/api/track/view`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug: slug })
            }).catch(e => console.warn("Signal ping failed:", e));

            const body = document.getElementById('postBody');
            body.innerHTML = post.content || '<p>No content available.</p>';
            
            if (post.image_url) {
                const img = document.getElementById('postImg');
                img.src = post.image_url;
                img.alt = post.title;
                img.loading = 'lazy';
                img.style.display = 'block';
            }

            // Reveal content, hide loader
            document.getElementById('loader').style.display = 'none';
            body.style.display = 'block';

            // Track analytics view
            if (window.OTP && typeof window.OTP.trackView === 'function') {
                window.OTP.trackView(slug);
            }

            console.log(`[OTP] Loaded: ${post.title}`);
        } catch (e) {
            console.error("Uplink Error:", e);
            document.getElementById('loader').style.display = 'none';
            const titleEl = document.getElementById('postTitle');
            
            // --- FIRE LIVE TRAFFIC SIGNAL ---
            let apiBase = window.OTP_CONFIG?.apiBase || '';
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') apiBase = window.location.origin;
            
            fetch(`${apiBase}/api/track/view`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug: slug })
            }).catch(e => console.warn("Signal ping failed:", e));

            const body = document.getElementById('postBody');
            if (titleEl) titleEl.innerText = e.message === 'POST_NOT_FOUND' ? "SIGNAL NOT FOUND" : "UPLINK ERROR";
            if (body) {
                body.style.display = 'block';
                body.innerHTML = `<div style='text-align:center; padding: 60px 40px;'>
                    <p style='color:var(--muted); margin-bottom:30px;'>${e.message === 'POST_NOT_FOUND' ? 'This transmission has been archived or does not exist.' : 'Connection lost. Please try again.'}</p>
                    <a href='insights.html' style='color:var(--accent2); text-decoration:none; font-weight:bold; letter-spacing:2px; font-family:\'Space Grotesk\',sans-serif; border:1px solid rgba(0,236,255,0.3); padding:12px 24px; border-radius:8px;'>↩ RETURN TO VAULT</a>
                </div>`;
            }
        }
    });
  </script>
