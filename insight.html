  <style>
    body { background: #030305; color: #fff; margin: 0 !important; font-family: 'Inter', sans-serif; }
      
      /* SEAMLESS INSIGHT UI */
      .post-content { 
        max-width: 800px; 
        margin: 0 auto 100px; 
        padding: 0 24px; 
        line-height: 1.8; 
        font-size: 1.1rem; 
        color: var(--muted);
      }
      .post-content h1, .post-content h2, .post-content h3 { 
          color: #fff; 
          font-family: 'Syne', sans-serif; 
          margin-top: 60px; 
          text-transform: uppercase;
          letter-spacing: -1px;
      }
      .post-content h1 { font-size: 2.5rem; }
      .post-content h2 { font-size: 2rem; }
      .post-content h3 { font-size: 1.5rem; }
      
      .post-content p { margin-bottom: 25px; }
      .post-content strong { color: #fff; font-weight: 700; }
      .post-content ul, .post-content ol { margin-bottom: 30px; padding-left: 20px; }
      .post-content li { margin-bottom: 12px; }
      
      .post-header { text-align: center; margin-bottom: 80px; padding: 0 20px; }
      .post-header h1 { 
        font-size: clamp(2.5rem, 8vw, 5rem); 
        margin-bottom: 20px; 
        color: #fff; 
        line-height: 1.0;
        text-transform: uppercase;
        font-family: 'Syne', sans-serif;
        letter-spacing: -3px;
      }
      .post-meta { 
        font-family: 'Space Grotesk', sans-serif; 
        font-size: 0.8rem; 
        color: var(--accent2); 
        margin-bottom: 30px; 
        display: inline-block; 
        letter-spacing: 4px; 
        text-transform: uppercase; 
        font-weight: 800;
        padding: 8px 16px;
        border: 1px solid rgba(var(--accent2-rgb), 0.2);
        border-radius: 8px;
        background: rgba(var(--accent2-rgb), 0.05);
      }

      .post-img { 
        width: 100%; 
        max-height: 60vh;
        object-fit: cover;
        border-radius: 32px; 
        margin-bottom: 80px; 
        border: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 40px 100px -20px rgba(0,0,0,0.6);
      }
      
      .back-to-vault {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        text-decoration: none;
        font-family: 'Space Grotesk', sans-serif;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 3px;
        font-weight: 800;
        transition: all 0.4s;
        margin-bottom: 60px;
        opacity: 0.85;
      }
      .back-to-vault:hover {
        color: var(--accent2);
        transform: translateX(-8px);
        opacity: 1;
      }
      .back-to-vault::before {
          content: "←";
          font-size: 1.2rem;
      }
      
      [data-theme="light"] body { background: #ffffff; color: #111; }
      [data-theme="light"] .post-header h1 { color: #000; }
      [data-theme="light"] .post-content { color: #333; }
      [data-theme="light"] .post-content h1, 
      [data-theme="light"] .post-content h2, 
      [data-theme="light"] .post-content h3 { color: #000; }
      [data-theme="light"] .post-content strong { color: #000; }
      [data-theme="light"] .post-img { border-color: rgba(0,0,0,0.05); }
  
      /* VIDEO WRAPPERS */
      .video-container { 
          position: relative; 
          padding-bottom: 56.25%; 
          height: 0; 
          overflow: hidden; 
          border-radius: 24px; 
          border: 1px solid rgba(255,255,255,0.1);
          margin: 40px 0;
          box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      }
      [data-theme="light"] .video-container { border-color: rgba(0,0,0,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
      .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  
      /* BLOCKQUOTE */
      blockquote {
          margin: 40px 0;
          padding: 30px 40px;
          background: rgba(255,255,255,0.02);
          border-left: 4px solid var(--accent2);
          border-radius: 0 20px 20px 0;
          font-style: italic;
          font-size: 1.25rem;
          color: #fff;
      }
      [data-theme="light"] blockquote { background: #f9f9fb; color: #333; }
      [data-theme="light"] .post-content pre,
      [data-theme="light"] .post-content code {
          background: rgba(0, 0, 0, 0.06);
          color: #111;
      }
  
      /* CONTENT RESET FOR INJECTED POSTS */
      .post-content img {
          max-width: 100%;
          height: auto;
          border-radius: 12px;
          margin: 30px 0;
      }
      .post-content pre, .post-content code {
          background: rgba(255,255,255,0.03);
          padding: 15px;
          border-radius: 12px;
          overflow-x: auto;
          font-family: 'Space Grotesk', monospace;
          font-size: 0.9rem;
      }
      .post-content pre code { padding: 0; background: transparent; }
      @media (max-width: 600px) {
          .post-header h1 { font-size: 3rem; letter-spacing: -2px; }
          .post-content { padding: 0 20px; font-size: 1rem; }
      }

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const rawSlug = params.get('slug');
        const slug = (window.OTP && typeof window.OTP.sanitizeSlugParam === 'function')
            ? window.OTP.sanitizeSlugParam(rawSlug)
            : String(rawSlug || '').trim();
        if (!slug) { window.location.href = 'insights.html'; return; }

        // Wait for OTP_CONFIG to be available
        let attempts = 0;
        while (!window.OTP_CONFIG && attempts < 20) {
            await new Promise(r => setTimeout(r, 150));
            attempts++;
        }

        try {
            if (!window.supabase || !window.OTP_CONFIG) throw new Error('CONFIG_MISSING');

            const supabase = window.OTP.getSupabase();
            const { data: post, error } = await supabase
                .from('posts')
                .select('*')
                .eq('slug', slug)
                .neq('slug', 'system-global-state')
                .eq('published', true)  // Block drafts from being accessed directly
                .single();

            if (error || !post) throw new Error("POST_NOT_FOUND");

            // --- Update Page Meta ---
            document.title = `${post.title} | Only True Perspective`;
            const postTitleEl = document.getElementById('postTitle');
            const postMetaEl = document.getElementById('postMeta');
            if (postTitleEl) postTitleEl.innerText = post.title || '';
            if (postMetaEl) postMetaEl.innerText = `${new Date(post.created_at).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})} • ${post.category || 'Insight'}`;

            // Dynamically update OG tags for proper social sharing
            const postExcerpt = (post.excerpt || post.content || '').replace(/<[^>]*>/g, '').substring(0, 160);
            const safeHero = (window.OTP && typeof window.OTP.sanitizeHttpUrl === 'function')
                ? window.OTP.sanitizeHttpUrl(post.image_url)
                : '';
            const postImage = safeHero || 'https://www.onlytrueperspective.tech/og.jpg';
            const postUrl = `https://www.onlytrueperspective.tech/insight.html?slug=${encodeURIComponent(slug)}`;
            document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${post.title} | Only True Perspective`);
            document.querySelector('meta[property="og:description"]')?.setAttribute('content', postExcerpt);
            document.querySelector('meta[property="og:image"]')?.setAttribute('content', postImage);
            document.querySelector('meta[property="og:url"]')?.setAttribute('content', postUrl);
            document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', post.title);
            document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', postExcerpt);
            document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', postImage);
            // --- FIRE LIVE TRAFFIC SIGNAL ---
            if (window.OTP && typeof window.OTP.trackView === 'function') {
                window.OTP.trackView(slug);
            }
            
            const body = document.getElementById('postBody');
            if (!body) throw new Error('CONFIG_MISSING');
            const raw = post.content || '';
            let html = '';
            if (typeof marked !== 'undefined') {
                html = marked.parse(raw);
            } else {
                html = raw || '<p>No content available.</p>';
            }
            body.innerHTML = window.OTP.sanitizeHtml(html);

            // Fix the return link to use dynamic theme and better styling
            const footerNav = document.createElement('div');
            footerNav.style.cssText = 'text-align:center; margin-top:80px; padding-top:40px; border-top:1px solid rgba(var(--accent2-rgb), 0.1);';
            footerNav.innerHTML = `
                <a href='insights.html' style='color:var(--accent2); text-decoration:none; font-weight:bold; letter-spacing:2px; font-family:"Space Grotesk",sans-serif; border:1px solid rgba(var(--accent2-rgb), 0.3); padding:12px 24px; border-radius:8px; display:inline-block;' class='k-hover'>↩ RETURN TO VAULT</a>
            `;
            body.appendChild(footerNav);
            
            if (safeHero) {
                const img = document.getElementById('postImg');
                if (img) {
                    img.src = safeHero;
                    img.alt = post.title || '';
                    img.loading = 'lazy';
                    img.style.display = 'block';
                }
            }

            // Reveal content, hide loader
            const loaderEl = document.getElementById('loader');
            if (loaderEl) loaderEl.style.display = 'none';
            body.style.display = 'block';

        } catch (e) {
            console.error("Uplink Error:", e);
            const loaderErr = document.getElementById('loader');
            if (loaderErr) loaderErr.style.display = 'none';
            const titleEl = document.getElementById('postTitle');
            const msg = String(e && e.message != null ? e.message : e);
            const body = document.getElementById('postBody');
            if (titleEl) {
                titleEl.innerText = msg === 'POST_NOT_FOUND' ? "SIGNAL NOT FOUND"
                    : msg === 'CONFIG_MISSING' ? "CONFIGURATION ERROR" : "UPLINK ERROR";
            }
            if (body) {
                body.style.display = 'block';
                const detail = msg === 'POST_NOT_FOUND'
                    ? 'This transmission has been archived or does not exist.'
                    : msg === 'CONFIG_MISSING'
                    ? 'Required scripts did not load. Try a hard refresh or disable extensions that block CDNs.'
                    : 'Connection lost. Please try again.';
                body.innerHTML = `<div style='text-align:center; padding: 60px 40px;'>
                    <p style='color:var(--muted); margin-bottom:30px;'>${detail}</p>
                    <a href='insights.html' style='color:var(--accent2); text-decoration:none; font-weight:bold; letter-spacing:2px; font-family:\'Space Grotesk\',sans-serif; border:1px solid rgba(var(--accent2-rgb), 0.35); padding:12px 24px; border-radius:8px;'>↩ RETURN TO VAULT</a>
                </div>`;
            }
        }
    });
  </script>
