<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Perspective Lost. This view doesn't exist.">
    <meta name="theme-color" content="#030305" />
    <meta name="color-scheme" content="dark light" />
    <title>404 | Perspective Lost</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <script src="theme-chrono.js?v=3"></script>
    <link rel="stylesheet" href="./styles.css?v=16.3.2" />
    <style>
        :root {
            --accent2: rgb(0, 236, 255);
            --accent2-rgb: 0, 236, 255;
        }
        .error-page {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            background: #030305;
            padding: 24px 16px;
            box-sizing: border-box;
        }
        .error-code {
            font-family: 'Syne', sans-serif;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 1.25rem;
            color: var(--muted);
            margin-bottom: 40px;
            max-width: 40ch;
        }
        html[data-theme="light"] .error-page {
            background: #eceef2;
        }
        html[data-theme="light"] .error-code {
            background: linear-gradient(180deg, #0a0a0f 0%, rgba(10,10,15,0.35) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        html[data-theme="light"] .error-message {
            color: #444;
        }
    </style>
</head>
<body class="error-page k-cursor-ready">
    <canvas id="cursor-canvas"></canvas>
    <div class="bg-fixed"></div>
    <div class="error-code">404</div>
    <div class="error-message">You've reached a blind spot in the vision. This perspective doesn't exist yet.</div>
    <a href="index.html" class="book-btn">Back to Reality</a>
    
    <script src="site-config.js?v=16.3.0" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js" defer></script>
    <script src="stars-v2.js?v=16.3.0" defer></script>
    <script src="site-init.js?v=16.3.3" defer></script>
  <script type="module" src="speed-insights-bundle.js?v=2.0.0"></script>
</body>
</html>
