<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Perspective Lost. This view doesn't exist.">
    <meta name="theme-color" content="#030305" />
    <title>404 | Perspective Lost</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            background: #030305;
        }
        .error-code {
            font-family: 'Syne', sans-serif;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 1.25rem;
            color: var(--muted);
            margin-bottom: 40px;
            max-width: 40ch;
        }
    </style>
  <!-- THEME GUARD: Prevents flickering by initializing theme before first paint -->
  <script>
    (function() {
        window.OTP_HUES = [
            { dark: '0, 236, 255', light: '0, 170, 204' }, // Cyan
            { dark: '170, 0, 255', light: '120, 0, 200' }, // Purple
            { dark: '255, 0, 170', light: '200, 0, 120' }, // Pink
            { dark: '0, 255, 170', light: '0, 180, 120' }, // Green
            { dark: '255, 215, 0', light: '184, 134, 11' }, // Gold
            { dark: '255, 60, 0',  light: '200, 40, 0' }    // Neon Orange
        ];
        
        // Randomize hue every load/refresh
        let hueIndex = Math.floor(Math.random() * window.OTP_HUES.length);
        sessionStorage.setItem('otp_hue_index', hueIndex);
        window.OTP_HUE_INDEX = hueIndex;
        const selectedHue = window.OTP_HUES[hueIndex];

        const savedTheme = localStorage.getItem('theme');
        const isManual = localStorage.getItem('theme_manual') === 'true';
        const manualTime = parseInt(localStorage.getItem('theme_manual_time') || '0');
        const isExpired = Date.now() - manualTime > 12 * 60 * 60 * 1000;
        
        let theme;
        if (isManual && !isExpired) {
            theme = savedTheme;
        } else {
            const hour = new Date().getHours();
            theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
        }

        const rootStyle = document.documentElement.style;
        if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            rootStyle.setProperty('--accent2-rgb', selectedHue.light);
            rootStyle.setProperty('--accent2', `rgb(${selectedHue.light})`);
        } else {
            document.documentElement.removeAttribute('data-theme');
            rootStyle.setProperty('--accent2-rgb', selectedHue.dark);
            rootStyle.setProperty('--accent2', `rgb(${selectedHue.dark})`);
        }
    })();
  </script>
</head>
<body class="error-page k-cursor-ready">
    <canvas id="cursor-canvas"></canvas>
    <div class="bg-fixed"></div>
    <div class="error-code">404</div>
    <div class="error-message">You've reached a blind spot in the vision. This perspective doesn't exist yet.</div>
    <a href="index.html" class="book-btn">Back to Reality</a>
    
    <script src="site-config.js" defer></script>
    <script src="stars-v2.js" defer></script>
    <script src="site-init.js?v=1773413465" defer></script>
</body>
</html>
