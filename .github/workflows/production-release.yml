name: Production Release

on:
  workflow_dispatch:
    inputs:
      confirm_clean_release:
        description: "Type CLEAN_RELEASE to deploy through the production gate."
        required: true
        type: string

concurrency:
  group: otp-production-release
  cancel-in-progress: false

permissions:
  contents: read

env:
  LIVE_API_URL: https://www.onlytrueperspective.tech
  E2E_TEST_MODE: "true"
  E2E_TEST_CLIENT_EMAIL: test@onlytrueperspective.tech
  E2E_TEST_PORTAL_TOKEN: test-safe-portal-token

jobs:
  gate:
    name: Clean Scoped Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Require explicit clean-release confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_clean_release }}" != "CLEAN_RELEASE" ]; then
            echo "Production release blocked: confirm_clean_release must be CLEAN_RELEASE."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify clean scoped release manifest
        run: npm run release:gate

      - name: Run unit and contract suite
        run: npm test

      - name: Run secret/security scan
        run: npm run security:scan

      - name: Build Speed Insights bundle
        run: npm run build:speed-insights

      - name: Run live master CI checks
        run: npm run master_test:ci

      - name: Run public production sweep
        run: npm run prod:full-sweep

      - name: Require authenticated sweep credentials
        env:
          OTP_ADMIN_PASSCODE: ${{ secrets.OTP_ADMIN_PASSCODE }}
          ADMIN_PASSCODE: ${{ secrets.ADMIN_PASSCODE }}
          OTP_ADMIN_TOKEN: ${{ secrets.OTP_ADMIN_TOKEN }}
        run: |
          if [ -z "${OTP_ADMIN_PASSCODE}${ADMIN_PASSCODE}${OTP_ADMIN_TOKEN}" ]; then
            echo "Missing authenticated sweep secret. Configure OTP_ADMIN_PASSCODE, ADMIN_PASSCODE, or OTP_ADMIN_TOKEN."
            exit 1
          fi

      - name: Run authenticated production sweep
        env:
          OTP_ADMIN_PASSCODE: ${{ secrets.OTP_ADMIN_PASSCODE }}
          ADMIN_PASSCODE: ${{ secrets.ADMIN_PASSCODE }}
          OTP_ADMIN_TOKEN: ${{ secrets.OTP_ADMIN_TOKEN }}
        run: npm run prod:full-sweep

      - name: Syntax checks
        run: |
          node --check server.js
          node --check bookings.js
          node --check client.js
          node --check site-init.js
          node --check stars-v2.js
          node --check theme-chrono.js
          node --check pricing-config.js
          node --check otp-attribution.js
          node --check scripts/prod_bootstrap_qa.js
          node --check scripts/prod_full_sweep.js
          node --check scripts/prod_sweep_v2_runner.js
          node --check scripts/prod_terminal_sweep.js
          node --check scripts/verify_release_scope.js
          node --check scripts/vercel_ignore_build_step.js

      - name: Whitespace and release-scope cleanliness
        run: |
          git diff --check
          npm run release:gate

  deploy:
    name: Deploy Prebuilt Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: gate
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify clean scoped release before deploy
        run: npm run release:gate

      - name: Require Vercel deployment secrets
        run: |
          if [ -z "${VERCEL_TOKEN}${VERCEL_ORG_ID}${VERCEL_PROJECT_ID}" ]; then
            echo "Missing Vercel deployment secrets."
            exit 1
          fi

      - name: Pull Vercel production environment
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production output
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt production output
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
