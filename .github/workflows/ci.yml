# Runs on every PR and push to main. Keeps "test + live health headers" on autopilot.
# Optional: set repo secret OTP_ADMIN_TOKEN to run authenticated admin checks in the production sweep.
# Use a real admin JWT. Configure it in GitHub: Settings → Secrets and variables → Actions → OTP_ADMIN_TOKEN.
# If you also run the sweep against a Vercel-backed environment, mirror the same JWT as the Vercel env var OTP_ADMIN_TOKEN.
# Note: Do not use `secrets` in job-level `if:` — GitHub may reject the workflow (no jobs run).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Used by tests/security_perf_audit.js when invoked from master_runner.js
  LIVE_API_URL: https://www.onlytrueperspective.tech

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Master test suite (includes live security/health audit via LIVE_API_URL)
        run: npm test

      - name: Build if defined
        run: npm run build --if-present

  # Production terminal sweep: public checks always run; admin checks are optional when OTP_ADMIN_TOKEN is set.
  terminal-sweep:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      OTP_ADMIN_TOKEN: ${{ secrets.OTP_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Production terminal sweep
        run: npm run prod:terminal-sweep
