# Runs on every PR and push to main. Keeps test, release-scope, and live health checks on autopilot.
# Production deploys are handled by .github/workflows/production-release.yml after the clean scoped gate passes.
# Optional: set repo secret OTP_ADMIN_PASSCODE, ADMIN_PASSCODE, or OTP_ADMIN_TOKEN to run authenticated admin checks.
# Note: Do not use `secrets` in job-level `if:` — GitHub may reject the workflow (no jobs run).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Used by tests/security_perf_audit.js when invoked from master_runner.js
  LIVE_API_URL: https://www.onlytrueperspective.tech

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify scoped release guard shape
        run: npm run release:scope

      - name: Master test suite (includes live security/health audit via LIVE_API_URL)
        run: npm test

      - name: Secret/security scan
        run: npm run security:scan

      - name: Speed Insights bundle check
        run: npm run build:speed-insights

      - name: Build if defined
        run: npm run build --if-present

  # Production terminal sweep: public checks always run; admin checks are optional when OTP_ADMIN_TOKEN is set.
  terminal-sweep:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      OTP_ADMIN_TOKEN: ${{ secrets.OTP_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Production terminal sweep
        run: npm run prod:terminal-sweep
